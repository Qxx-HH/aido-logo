<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <title>爱多电子画册</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ece8df;
      --card: #ffffff;
      --text: #20242b;
      --muted: #707885;
      --line: rgba(32, 36, 43, 0.08);
      --shadow: 0 18px 44px rgba(32, 36, 43, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(205, 166, 102, 0.18), transparent 26%),
        linear-gradient(180deg, #f6f2ea 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Microsoft YaHei UI", "PingFang SC", "Noto Sans SC", sans-serif;
    }

    .shell {
      width: min(860px, 100%);
      margin: 0 auto;
      padding: 18px 12px 28px;
    }

    .intro {
      padding: 12px 8px 18px;
      text-align: center;
    }

    .intro h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
    }

    .intro p {
      margin: 10px 0 0;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .pages {
      display: grid;
      gap: 16px;
    }

    .page {
      margin: 0;
      padding: 0;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .page img {
      display: block;
      width: 100%;
      height: auto;
      background: #f1efe8;
    }

    .page figcaption {
      padding: 10px 14px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="intro">
      <h1>爱多电子画册</h1>
      <p>微信内可直接预览。向下滑动查看全部 40 页。</p>
    </section>
    <section class="pages" id="pages"></section>
  </main>
  <script>
    const totalPages = 40;
    const pagesEl = document.getElementById("pages");
    for (let i = 1; i <= totalPages; i += 1) {
      const num = String(i).padStart(2, "0");
      const fig = document.createElement("figure");
      fig.className = "page";
      const img = document.createElement("img");
      img.alt = `爱多电子画册 第 ${i} 页`;
      img.loading = i === 1 ? "eager" : "lazy";
      img.decoding = "async";
      img.src = `./mobile/page-${num}.jpg`;
      const cap = document.createElement("figcaption");
      cap.textContent = `第 ${i} / ${totalPages} 页`;
      fig.append(img, cap);
      pagesEl.append(fig);
    }
  </script>
</body>
</html>
