<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <title>爱多电子画册预览</title>
  <style>
    :root {
      --bg: #efede7;
      --surface: rgba(255, 255, 255, 0.94);
      --text: #1f252c;
      --muted: #6d7580;
      --line: rgba(31, 37, 44, 0.08);
      --accent: #0e4c97;
      --gold: #c49042;
      --shadow: 0 20px 48px rgba(31, 37, 44, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Microsoft YaHei UI", "PingFang SC", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at top, rgba(196, 144, 66, 0.16), transparent 24%),
        linear-gradient(180deg, #f8f5ef 0%, var(--bg) 100%);
    }

    .wrap {
      width: min(860px, 100%);
      margin: 0 auto;
      padding: 18px 12px 96px;
    }

    .hero {
      border-radius: 26px;
      background: linear-gradient(135deg, #0d4b97 0%, #143f78 52%, #1a2f4d 100%);
      box-shadow: var(--shadow);
      color: #fff;
      overflow: hidden;
    }

    .hero-card {
      padding: 18px;
    }

    .hero-card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.22);
    }

    .hero-copy {
      padding: 0 20px 22px;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.76);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.08;
    }

    .hero-copy p {
      margin: 14px 0 0;
      font-size: 15px;
      line-height: 1.8;
      color: rgba(255,255,255,0.82);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 15px;
      color: #fff;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
    }

    .btn.primary {
      background: linear-gradient(135deg, #d29f51 0%, #b88133 100%);
    }

    .note {
      margin-top: 18px;
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.58);
      box-shadow: var(--shadow);
      padding: 16px 18px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--muted);
    }

    .pages {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .page-card {
      border-radius: 22px;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.56);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .page-card img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    .page-meta {
      padding: 12px 14px 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .floating {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .floating a {
      min-height: 48px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 15px;
      color: #fff;
      box-shadow: 0 16px 40px rgba(0,0,0,0.2);
      background: rgba(17,19,22,0.92);
      backdrop-filter: blur(10px);
    }

    .floating a.primary {
      background: linear-gradient(135deg, #0e4c97 0%, #173b67 100%);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="hero-card">
        <img src="./mobile/page-01.jpg" alt="爱多电子画册封面">
      </div>
      <div class="hero-copy">
        <p class="eyebrow">AIDO E-BROCHURE PREVIEW</p>
        <h1>爱多电子画册预览</h1>
        <p>当前页面为在线预览版，直接向下滑动即可查看产品内容，无需先下载 PDF。</p>
        <div class="actions">
          <a class="btn primary" href="#pages">开始查看内容</a>
          <a class="btn" href="./aido-logo.pdf" target="_blank" rel="noopener">完整 PDF</a>
        </div>
      </div>
    </section>

    <div class="note">
      这是面向微信扫码客户的直接预览版本。页面会按需加载画册图片，打开后就能直接看产品内容；如需保存或转发完整版，再点击“完整 PDF”。
    </div>

    <section class="pages" id="pages"></section>
  </main>

  <div class="floating">
    <a href="#pages">返回内容</a>
    <a class="primary" href="./aido-logo.pdf" target="_blank" rel="noopener">完整 PDF</a>
  </div>

  <script>
    const totalPages = 40;
    const pagesEl = document.getElementById("pages");

    function pageSrc(n) {
      return `./mobile/page-${String(n).padStart(2, "0")}.jpg`;
    }

    const fragment = document.createDocumentFragment();
    for (let i = 1; i <= totalPages; i += 1) {
      const card = document.createElement("article");
      card.className = "page-card";
      const img = document.createElement("img");
      img.src = pageSrc(i);
      img.alt = `爱多电子画册第 ${i} 页`;
      img.loading = i <= 3 ? "eager" : "lazy";
      img.decoding = "async";
      const meta = document.createElement("div");
      meta.className = "page-meta";
      meta.textContent = `第 ${i} 页`;
      card.append(img, meta);
      fragment.append(card);
    }
    pagesEl.append(fragment);
  </script>
</body>
</html>
