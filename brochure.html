<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <title>爱多电子画册</title>
  <style>
    :root {
      --bg: #f4f0e8;
      --text: #1f252c;
      --muted: #6d7580;
      --accent: #0e4c97;
      --accent-dark: #0a3568;
      --gold: #c49042;
      --surface: rgba(255, 255, 255, 0.92);
      --line: rgba(31, 37, 44, 0.08);
      --shadow: 0 24px 60px rgba(31, 37, 44, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--text);
      font-family: "Microsoft YaHei UI", "PingFang SC", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at top, rgba(196, 144, 66, 0.18), transparent 26%),
        linear-gradient(180deg, #f8f5ef 0%, var(--bg) 100%);
    }

    .card {
      width: min(760px, 100%);
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .cover {
      padding: 18px;
      background: linear-gradient(135deg, #0d4b97 0%, #143f78 50%, #1a2f4d 100%);
    }

    .cover img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
    }

    .content {
      padding: 24px 22px 26px;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.08;
    }

    p {
      margin: 14px auto 0;
      max-width: 30em;
      font-size: 15px;
      line-height: 1.8;
      color: var(--muted);
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 240px;
      min-height: 52px;
      margin-top: 22px;
      padding: 0 24px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #fff;
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      box-shadow: 0 18px 40px rgba(14, 76, 151, 0.24);
    }

    .note {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="cover">
      <img src="./mobile/page-01.jpg" alt="爱多电子画册封面">
    </div>
    <div class="content">
      <p class="eyebrow">AIDO E-BROCHURE</p>
      <h1>爱多电子画册</h1>
      <p>点击下方按钮，即可查看完整爱多电子画册 PDF。</p>
      <a class="cta" href="./aido-logo.pdf" target="_blank" rel="noopener">查看爱多电子画册</a>
      <div class="note">如未自动在微信内预览，可继续在系统浏览器中打开。</div>
    </div>
  </main>
</body>
</html>
